<!doctype html>
<html lang="en" class="orb-kaeya">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaeya</title>
<style>
  :root{ --pink:#f5a9d0; --violet:#9b8cff; --cyan:#7ee0e6; --gold:#fce9b8; --accent-2:#4f6bff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:transparent; overflow:hidden; }
  /* The window grows to fit the ring while the menu is open; the stage always
     centres the ball, and the ring is positioned around that centre. */
  #stage{ position:fixed; inset:0; display:grid; place-items:center; }

  .bot{ position:relative; z-index:3; width:76px; height:76px; border:none; padding:0; background:none; cursor:pointer;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1); -webkit-tap-highlight-color:transparent; }
  .bot:hover{ transform:scale(1.08); }
  .bot:active{ transform:scale(.96); }

  .orb{ display:block; width:76px; height:76px; border-radius:50%; position:relative;
    background:
      radial-gradient(circle at 33% 25%, rgba(255,255,255,.95), rgba(255,255,255,0) 24%),
      radial-gradient(circle at 72% 20%, var(--gold), transparent 38%),
      radial-gradient(circle at 80% 72%, var(--cyan), transparent 46%),
      radial-gradient(circle at 26% 80%, var(--pink), transparent 50%),
      radial-gradient(circle at 50% 48%, var(--violet), #6a5cd6 80%);
    box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 14px 30px -8px rgba(120,110,240,.6);
    animation: bob 4s ease-in-out infinite; }
  .orb::after{ content:""; position:absolute; left:22%; top:13%; width:32%; height:24%; border-radius:50%;
    background: radial-gradient(circle at 42% 42%, rgba(255,255,255,.95), transparent 70%); }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }

  /* look variants */
  .orb-ocean .orb{ background:
      radial-gradient(circle at 32% 23%, rgba(255,255,255,.95), rgba(255,255,255,0) 26%),
      radial-gradient(circle at 72% 30%, #7cc0ff, transparent 44%),
      radial-gradient(circle at 50% 55%, #2f6bff, #123a9e 82%);
    box-shadow: inset 0 -8px 18px rgba(10,30,90,.5), inset 0 8px 16px rgba(255,255,255,.5), 0 14px 30px -8px rgba(40,90,230,.6); }
  .orb-blossom .orb{ background:
      radial-gradient(circle at 33% 25%, rgba(255,255,255,.95), rgba(255,255,255,0) 25%),
      radial-gradient(circle at 74% 26%, #ffe0a3, transparent 40%),
      radial-gradient(circle at 78% 74%, #8fe9ef, transparent 48%),
      radial-gradient(circle at 30% 78%, #ff9ecb, transparent 52%),
      radial-gradient(circle at 50% 50%, #ff90d0, #d979b3 82%);
    box-shadow: inset 0 -8px 18px rgba(150,40,110,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 14px 30px -8px rgba(255,140,200,.6); }
  .orb-mint .orb{ background:
      radial-gradient(circle at 33% 24%, rgba(255,255,255,.95), rgba(255,255,255,0) 26%),
      radial-gradient(circle at 74% 30%, #d3ffe6, transparent 42%),
      radial-gradient(circle at 50% 55%, #34d399, #0f9d76 82%);
    box-shadow: inset 0 -8px 18px rgba(10,90,70,.4), inset 0 8px 16px rgba(255,255,255,.55), 0 14px 30px -8px rgba(40,210,150,.55); }
  .orb-ember .orb{ background:
      radial-gradient(circle at 33% 24%, rgba(255,255,255,.95), rgba(255,255,255,0) 26%),
      radial-gradient(circle at 74% 28%, #ffe1b0, transparent 42%),
      radial-gradient(circle at 30% 78%, #ff7a8a, transparent 52%),
      radial-gradient(circle at 50% 52%, #ff8a5c, #e0523f 82%);
    box-shadow: inset 0 -8px 18px rgba(140,40,30,.4), inset 0 8px 16px rgba(255,255,255,.55), 0 14px 30px -8px rgba(255,130,90,.6); }
  .orb-face .orb{ background:
      radial-gradient(circle at 33% 25%, rgba(255,255,255,.9), rgba(255,255,255,0) 30%),
      radial-gradient(circle at 50% 55%, #b7abff, #8b7be6 82%);
    box-shadow: inset 0 -8px 18px rgba(60,45,130,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 14px 30px -8px rgba(140,120,240,.55); }
  .orb-kaeya .orb{ background:#0b4bb8 url('kaeya-logo.png') center/cover no-repeat; border-radius:24%;
    box-shadow: inset 0 -6px 14px rgba(6,40,110,.35), inset 0 6px 12px rgba(255,255,255,.25), 0 14px 30px -8px rgba(11,75,184,.6); }
  .orb-kaeya .orb::after{ display:none; }
  .face{ display:none; position:absolute; inset:0; z-index:2; }
  .orb-face .face{ display:block; }
  .orb-kaeya .face{ display:none; }
  .eye{ position:absolute; top:37%; width:13%; height:17%; border-radius:50%; background:#2c2657; }
  .eye.l{ left:29%; } .eye.r{ right:29%; }
  .mouth{ position:absolute; left:50%; top:56%; transform:translateX(-50%); width:26%; height:15%;
    border:2.5px solid #2c2657; border-top:none; border-radius:0 0 60px 60px; }

  @media (prefers-reduced-motion: reduce){ .orb{ animation:none; } }

  /* ---- working / done feedback (the "Kaeya is doing a task" glow) ---- */
  .orb.working{ animation: bob 4s ease-in-out infinite, working 1s ease-in-out infinite; }
  @keyframes working{
    0%,100%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 0 rgba(126,224,230,.55); }
    50%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 12px rgba(126,224,230,0); }
  }
  .orb.done{ animation: bob 4s ease-in-out infinite, doneflash .6s ease-out; }
  @keyframes doneflash{
    0%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 0 rgba(45,200,140,.85); }
    100%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 16px rgba(45,200,140,0); }
  }
  .orb.empty{ animation: bob 4s ease-in-out infinite, shake .4s ease; }
  @keyframes shake{ 0%,100%{ transform:translateX(0);} 25%{ transform:translateX(-5px);} 75%{ transform:translateX(5px);} }
  .orb.demo{ animation: bob 4s ease-in-out infinite, demoflash .7s ease-out; }
  @keyframes demoflash{
    0%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 0 rgba(224,146,40,.9); }
    100%{ box-shadow: inset 0 -8px 18px rgba(70,50,140,.35), inset 0 8px 16px rgba(255,255,255,.6), 0 0 0 16px rgba(224,146,40,0); }
  }

  /* ---- radial quick-action menu ---- */
  #ring{ position:absolute; left:50%; top:50%; width:0; height:0; z-index:2; }

  /* A soft aurora glow that blooms behind the ring while it's open — makes the
     whole menu feel like it lights up rather than just popping in. Sized from
     --glow, which renderRing() sets to match however many buttons are showing. */
  #stage::before{ content:""; position:absolute; left:50%; top:50%;
    width:var(--glow,330px); height:var(--glow,330px);
    margin:calc(var(--glow,330px) / -2) 0 0 calc(var(--glow,330px) / -2);
    border-radius:50%; pointer-events:none; z-index:0;
    background: radial-gradient(circle, rgba(123,140,255,.30), rgba(126,224,230,.14) 42%, transparent 68%);
    opacity:0; transform:scale(.35);
    transition: opacity .4s ease, transform .5s cubic-bezier(.22,1,.36,1); }
  #stage.open::before{ opacity:1; transform:scale(1); }

  .sat{ position:absolute; left:0; top:0; width:66px; height:66px; margin:-33px 0 0 -33px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    border:none; border-radius:50%; cursor:pointer; font-family:'Segoe UI', system-ui, sans-serif;
    color:#2a2f45; background:linear-gradient(155deg, rgba(255,255,255,.98), rgba(236,240,255,.90));
    -webkit-backdrop-filter:blur(9px); backdrop-filter:blur(9px);
    box-shadow:0 12px 26px -8px rgba(40,50,120,.5), inset 0 1px 0 rgba(255,255,255,.95), inset 0 -6px 12px rgba(120,130,220,.12);
    opacity:0; pointer-events:none;
    transform: rotate(var(--a)) translate(0px) rotate(calc(-1 * var(--a))) scale(.25);
    transition: transform .42s cubic-bezier(.34,1.56,.64,1), opacity .26s ease, box-shadow .18s, background .18s, color .18s; }
  /* Line icons (inline SVG — no CDN, no icon font). They inherit the button's
     `color` via currentColor, so the hover tint below needs no extra rule. */
  .sat .emo{ display:flex; align-items:center; justify-content:center; width:23px; height:23px;
    filter:drop-shadow(0 1px 2px rgba(60,60,120,.22)); }
  .sat .emo svg{ width:100%; height:100%; display:block; fill:none; stroke:currentColor;
    stroke-width:1.85; stroke-linecap:round; stroke-linejoin:round; }
  .sat .lbl{ font-size:9px; font-weight:700; letter-spacing:.02em; color:#5a6180; }

  /* Open state: fan the satellites out to their radius. */
  #stage.open .sat{ opacity:1; pointer-events:auto;
    transform: rotate(var(--a)) translate(var(--r)) rotate(calc(-1 * var(--a))) scale(1); }
  /* Staggered bloom — each satellite fans out just after the one before it.
     The delay is set INLINE per button by renderRing() (--d), not by hardcoded
     :nth-child rules, so any ring size the user picks staggers correctly. */
  #stage.open .sat{ transition-delay: var(--d, 0s); }
  /* ...but never delay the hover/press feedback itself, or the button would
     feel laggy by exactly its fan-out delay. */
  #stage.open .sat:hover, #stage.open .sat:active{ transition-delay: 0s; }

  /* Voice satellite: press-and-hold instead of click, shows a recording pulse. */
  .sat.recording{ background:linear-gradient(155deg,#fff,#ffe9ec) !important;
    box-shadow:0 16px 30px -8px rgba(220,50,80,.5), 0 0 0 4px rgba(230,60,90,.35) !important; }
  .sat.recording .emo{ animation: recpulse 1s ease-in-out infinite; }
  @keyframes recpulse{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

  /* Small "stop" badge pinned to the orb corner while a ring-triggered guide
     walkthrough is active — no window resize needed, sits within the existing
     120x120 window margin around the 76px ball. */
  #stopBadge{ position:absolute; top:2px; right:2px; z-index:4; width:22px; height:22px;
    border-radius:50%; border:none; cursor:pointer; display:none; align-items:center;
    justify-content:center; font-size:12px; font-weight:700; line-height:1;
    background:#e14b63; color:#fff; box-shadow:0 4px 10px -2px rgba(200,40,70,.6); }
  #stopBadge.show{ display:flex; }

  /* Voice confirmation bubble — reuses the ring's expanded 300px canvas so
     there's room for the transcript text; shown centered where the ring was. */
  #bubble{ position:absolute; left:50%; top:50%; width:220px; margin:-70px 0 0 -110px;
    padding:14px 16px; border-radius:16px; z-index:5; text-align:center;
    font-family:'Segoe UI', system-ui, sans-serif; color:#2a2f45;
    background:linear-gradient(155deg, rgba(255,255,255,.98), rgba(236,240,255,.94));
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    box-shadow:0 18px 34px -10px rgba(40,50,120,.5), inset 0 1px 0 rgba(255,255,255,.95);
    opacity:0; pointer-events:none; transform:scale(.85); transition:opacity .2s ease, transform .2s ease; }
  #bubble.show{ opacity:1; pointer-events:auto; transform:scale(1); }
  #bubble p{ margin:0 0 10px; font-size:12.5px; line-height:1.4; }
  #bubble .brow{ display:flex; gap:8px; justify-content:center; }
  #bubble .brow.bcol{ flex-direction:column; }   /* two full-width choices */
  #bubble button{ border:none; border-radius:10px; padding:7px 12px; font-size:11.5px;
    font-weight:700; cursor:pointer; font-family:inherit; }
  #bubble .yes{ background:#2f6bff; color:#fff; }
  #bubble .retry{ background:#eef1ff; color:#2a2f45; }

  /* Hover: lift + colour ring glow (needs the #stage.open specificity to win). */
  #stage.open .sat:hover{ color:#0b4bb8; background:linear-gradient(155deg,#fff,#eaf0ff);
    box-shadow:0 16px 30px -8px rgba(40,60,190,.55), 0 0 0 3px rgba(79,107,255,.30), inset 0 1px 0 rgba(255,255,255,.95);
    transform: rotate(var(--a)) translate(var(--r)) rotate(calc(-1 * var(--a))) scale(1.14); }
  #stage.open .sat:hover .lbl{ color:#0b4bb8; }
  #stage.open .sat:active{ transform: rotate(var(--a)) translate(var(--r)) rotate(calc(-1 * var(--a))) scale(1.03); }
</style>
</head>
<body>
  <div id="stage">
    <!-- Satellites are rendered by renderRing() from the user's saved choice
         (Settings -> "Buttons around the ball"), so both the count and the
         geometry are data-driven. -->
    <div id="ring"></div>
    <button id="stopBadge" aria-label="Stop guide" title="Stop guide">&#10005;</button>
    <div id="bubble"></div>
    <button class="bot" id="bot" aria-label="Open Kaeya" title="Ask Kaeya">
      <span class="orb"><span class="face"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span></span>
    </button>
  </div>
<script>
  var invoke = window.__TAURI__.core.invoke;
  var emit = window.__TAURI__.event.emit;
  var listen = window.__TAURI__.event.listen;
  var STYLES = ['orb-kaeya','orb-aurora','orb-ocean','orb-blossom','orb-mint','orb-ember','orb-face'];

  function applyStyle(s){
    if(STYLES.indexOf(s) === -1) return;
    var html = document.documentElement;
    STYLES.forEach(function(x){ html.classList.remove(x); });
    html.classList.add(s);
  }

  // restore saved look, and follow live changes from the main window
  try { applyStyle(localStorage.getItem('konx-style') || 'orb-kaeya'); } catch(e){}
  listen('konx-style', function(e){ applyStyle(e.payload); });

  // Window handles for dragging + resizing the orb window.
  var appWindow = window.__TAURI__.window.getCurrentWindow();
  var PhysicalPosition = window.__TAURI__.window.PhysicalPosition;
  var PhysicalSize = window.__TAURI__.window.PhysicalSize;
  var currentMonitor = window.__TAURI__.window.currentMonitor;

  // Restore the corner the user last dragged the orb to (Rust defaults it to
  // bottom-right; this overrides once the window is ready).
  try {
    var savedCorner = localStorage.getItem('kaeya-orb-corner');
    if(savedCorner) invoke('place_orb_corner', { corner: savedCorner });
  } catch(e){}

  var stage = document.getElementById('stage');
  var ring = document.getElementById('ring');
  var orbEl = document.querySelector('.orb');
  var stateTimer = null;
  // The (hidden) main window drives quick actions and reports back here so the
  // orb can show it's working / done, since no window opens.
  listen('konx-quick-state', function(e){
    var s = e.payload;
    orbEl.classList.remove('working','done','empty','demo');
    if(stateTimer){ clearTimeout(stateTimer); stateTimer=null; }
    if(s==='working'){ orbEl.classList.add('working'); }
    else if(s==='done' || s==='empty' || s==='demo'){
      orbEl.classList.add(s);
      stateTimer = setTimeout(function(){ orbEl.classList.remove('done','empty','demo'); }, 700);
    }
  });

  /* ---------- the ring: which buttons, and where they sit ----------
     The user picks which of these appear (Settings -> "Buttons around the
     ball"); the saved list lives in localStorage['konx-ring'] and the main
     window pushes changes here live via the 'konx-ring' event.

     Geometry is COMPUTED from the count, not hardcoded, so any size the user
     picks stays comfortably clickable:

         chord between two neighbours = 2 * r * sin(180deg / n)

     A satellite is 66px and grows to 1.14x on hover (~75px), so we need a
     chord of ~95px to leave a real gap between them. Solving for r and
     flooring at the original 104px gives: 3-6 buttons -> 104px (the classic
     look), 7 -> 110px, 8 -> 125px. Without this the 8-button ring would
     overlap itself on hover. */
  /* Icons are inline SVG paths, not emoji: emoji render as the OS's own colour
     glyphs (different on every Windows build, and they ignore our hover tint).
     These inherit `color` through currentColor and stay crisp at any size.
     Kept as bare path markup so renderRing() can wrap them in one <svg>. */
  var ICON = {
    answer:    '<path d="M20 11.5a7.5 7.5 0 0 1-10.9 6.7L4 20l1.8-4.9A7.5 7.5 0 1 1 20 11.5z"/>',
    improve:   '<path d="M10.5 3l1.7 4.3L16.5 9l-4.3 1.7-1.7 4.3-1.7-4.3L4.5 9l4.3-1.7L10.5 3z"/>' +
               '<path d="M17.5 14l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9.9-2.1z"/>',
    summarize: '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>' +
               '<path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/>',
    translate: '<circle cx="12" cy="12" r="9"/><path d="M3.4 9h17.2M3.4 15h17.2"/>' +
               '<path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/>',
    explain:   '<path d="M9.5 18.5h5"/><path d="M10.5 21.5h3"/>' +
               '<path d="M12 2.5a6.5 6.5 0 0 0-3.8 11.8v2.2h7.6v-2.2A6.5 6.5 0 0 0 12 2.5z"/>',
    fix:       '<path d="M20 6.5L9.2 17.3 4 12.1"/>',
    guide:     '<circle cx="12" cy="12" r="9"/><path d="M15.6 8.4l-2.1 5.1-5.1 2.1 2.1-5.1 5.1-2.1z"/>',
    voice:     '<rect x="9" y="2.5" width="6" height="11" rx="3"/>' +
               '<path d="M5.5 11.5a6.5 6.5 0 0 0 13 0"/><path d="M12 18v3.5"/>'
  };
  function iconSvg(id){
    return '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">' + (ICON[id] || '') + '</svg>';
  }

  var RING_CATALOG = [
    { id:'answer',    lbl:'Answer' },
    { id:'improve',   lbl:'Improve' },
    { id:'summarize', lbl:'Summary' },
    { id:'translate', lbl:'Translate' },
    { id:'explain',   lbl:'Explain' },
    { id:'fix',       lbl:'Fix' },
    { id:'guide',     lbl:'Guide' },
    { id:'voice',     lbl:'Voice' }
  ];
  var RING_MIN = 3, RING_MAX = 8, SAT_CHORD = 95, RING_MIN_R = 104;
  var ringIds = [], RING_R = RING_MIN_R;
  var OPEN = 300;   // orb window size (logical px) while the ring is open

  function defaultRingIds(){
    return RING_CATALOG.map(function(c){ return c.id; });
  }

  function readRingIds(){
    try {
      var raw = localStorage.getItem('konx-ring');
      if(raw){
        var ids = JSON.parse(raw);
        if(Object.prototype.toString.call(ids) === '[object Array]'){
          ids = ids.filter(function(id){
            for(var i=0;i<RING_CATALOG.length;i++) if(RING_CATALOG[i].id === id) return true;
            return false;
          });
          if(ids.length >= RING_MIN && ids.length <= RING_MAX) return ids;
        }
      }
    } catch(e){}
    return defaultRingIds();
  }

  function renderRing(){
    ringIds = readRingIds();
    var n = ringIds.length;
    // radius that keeps ~95px between neighbouring button centres
    var needed = Math.ceil(SAT_CHORD / (2 * Math.sin(Math.PI / n)));
    RING_R = Math.max(RING_MIN_R, needed);
    OPEN = Math.max(300, 2 * (RING_R + 45));
    stage.style.setProperty('--glow', (2 * (RING_R + 40)) + 'px');

    var html = '';
    ringIds.forEach(function(id, i){
      var c = null;
      for(var k=0;k<RING_CATALOG.length;k++) if(RING_CATALOG[k].id === id) c = RING_CATALOG[k];
      if(!c) return;
      var angle = -90 + i * (360 / n);          // first button at the top
      var delay = (0.03 + i * 0.04).toFixed(2); // same cascade feel as before
      html += '<button class="sat" data-task="' + c.id + '"' +
              ' style="--a:' + angle + 'deg; --r:' + RING_R + 'px; --d:' + delay + 's;">' +
              '<span class="emo">' + iconSvg(c.id) + '</span>' +
              '<span class="lbl">' + c.lbl + '</span></button>';
    });
    ring.innerHTML = html;
    wireSatellites();
  }

  var menuOpen = false, openTimer = null, savedGeom = null;
  // While true, closeMenu() hides the ring but does NOT shrink the window back
  // down — used to keep room for the voice confirmation bubble, which reuses
  // this same expanded canvas instead of needing its own resize logic.
  var keepOpenForBubble = false;

  // Set while a shrink-back is still in flight. Any expand MUST wait for it,
  // or it would measure the still-expanded window and save THAT as the
  // collapsed size — leaving the orb permanently oversized.
  var restoring = null;

  // Grow the orb window to fit the ring (or the bubble), remembering the size
  // it had so closeMenu() can put it back. Shared by both so the geometry
  // bookkeeping exists in exactly one place.
  function expandWindow(){
    return Promise.resolve(restoring).then(function(){
      return Promise.all([appWindow.outerPosition(), appWindow.outerSize(), currentMonitor()]);
    }).then(function(res){
      var pos = res[0], size = res[1], mon = res[2];
      if(!savedGeom) savedGeom = { x: pos.x, y: pos.y, w: size.width, h: size.height };
      var dpr = window.devicePixelRatio || 1;
      var openPx = Math.round(OPEN * dpr);
      // keep the ball centred where it is now, then clamp fully on-screen
      var cx = pos.x + size.width / 2, cy = pos.y + size.height / 2;
      var nx = Math.round(cx - openPx / 2), ny = Math.round(cy - openPx / 2);
      if(mon){
        var mp = mon.position, ms = mon.size;
        nx = Math.max(mp.x, Math.min(nx, mp.x + ms.width - openPx));
        ny = Math.max(mp.y, Math.min(ny, mp.y + ms.height - openPx));
      }
      return appWindow.setSize(new PhysicalSize(openPx, openPx)).then(function(){
        return appWindow.setPosition(new PhysicalPosition(nx, ny));
      });
    });
  }

  function openMenu(){
    if(menuOpen || drag) return;
    menuOpen = true;
    expandWindow()
      .then(function(){ if(menuOpen) stage.classList.add('open'); })
      .catch(function(){ menuOpen = false; });
  }

  function restoreWindowGeom(){
    if(!savedGeom) return restoring || Promise.resolve();
    var g = savedGeom; savedGeom = null;
    restoring = appWindow.setSize(new PhysicalSize(g.w, g.h)).then(function(){
      return appWindow.setPosition(new PhysicalPosition(g.x, g.y));
    }).catch(function(){}).then(function(){ restoring = null; });
    return restoring;
  }

  // True while the ring is showing specifically to act on something the user
  // just spoke. If that ring closes without a button being picked, the held
  // transcript must be thrown away — otherwise the NEXT ring action, minutes
  // later on completely different text, would silently reuse it.
  var voiceRingPending = false;

  function closeMenu(){
    if(openTimer){ clearTimeout(openTimer); openTimer = null; }
    if(!menuOpen) return;
    menuOpen = false;
    stage.classList.remove('open');
    if(voiceRingPending){ voiceRingPending = false; emit('konx-voice-discard'); }
    if(!keepOpenForBubble) restoreWindowGeom();
  }

  // Open on a short, deliberate hover so a quick press-to-drag/tap wins the race.
  var bot = document.getElementById('bot');
  bot.addEventListener('pointerenter', function(){
    if(drag || menuOpen) return;
    if(openTimer) clearTimeout(openTimer);
    openTimer = setTimeout(openMenu, 350);   // deliberate hover so a passing cursor doesn't trigger it
  });
  // Leaving the whole window closes it (moving to a satellite stays inside).
  stage.addEventListener('mouseleave', closeMenu);

  // Wire up whatever satellites renderRing() just drew. Called on every
  // re-render, so the handlers always match the buttons on screen.
  function wireSatellites(){
    Array.prototype.forEach.call(ring.querySelectorAll('.sat'), function(s){
      var task = s.getAttribute('data-task');

      // Voice is press-and-hold, not click. Same Pointer-Events + pointer
      // capture pattern as the Voice Command tab's push-to-talk button, so a
      // drifting finger/cursor still ends the recording cleanly.
      if(task === 'voice'){
        s.addEventListener('pointerdown', function(e){
          e.stopPropagation();
          voiceRingPending = false;   // starting a new recording replaces any held one
          try { s.setPointerCapture(e.pointerId); } catch(_){}
          s.classList.add('recording');
          emit('konx-radial-voice-start');
        });
        var endVoiceHold = function(e){
          if(!s.classList.contains('recording')) return;
          s.classList.remove('recording');
          try { s.releasePointerCapture(e.pointerId); } catch(_){}
          closeMenu();
          emit('konx-radial-voice-end');
        };
        s.addEventListener('pointerup', endVoiceHold);
        s.addEventListener('pointercancel', endVoiceHold);
        return;
      }

      // Everything else: click -> run that task in place, then tuck away.
      s.addEventListener('click', function(ev){
        ev.stopPropagation();
        voiceRingPending = false;   // consumed by this action, not discarded
        closeMenu();
        emit('konx-radial', task);
      });
    });
  }

  // Draw the ring now, and redraw whenever the user changes their picks in
  // Settings (the main window pushes the new list here immediately).
  renderRing();
  listen('konx-ring', function(e){
    try {
      if(e.payload) localStorage.setItem('konx-ring', JSON.stringify(e.payload));
    } catch(_){}
    // Close first if it happened to be open: a different button count needs a
    // different window size, and re-opening immediately would race the resize
    // (openMenu would read the still-expanded size and save THAT as the
    // collapsed geometry, leaving the orb permanently oversized). The next
    // hover opens it at the new size.
    if(menuOpen) closeMenu();
    renderRing();
  });

  // ---------- Stop-guide badge: pinned to the orb corner, no window resize ----------
  var stopBadge = document.getElementById('stopBadge');
  listen('konx-guide-active', function(e){
    stopBadge.classList.toggle('show', !!e.payload);
  });
  stopBadge.addEventListener('click', function(ev){
    ev.stopPropagation();
    emit('konx-guide-stop-tap');
  });

  // ---------- Voice confirmation bubble (reuses the ring's expanded canvas) ----------
  var bubble = document.getElementById('bubble');
  function escHtml(s){
    return ('' + s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function hideBubble(){
    bubble.classList.remove('show');
    bubble.innerHTML = '';
    if(keepOpenForBubble){ keepOpenForBubble = false; restoreWindowGeom(); }
  }
  listen('konx-voice-bubble', function(e){
    var d = e.payload || {};
    if(d.mode === 'clear'){ hideBubble(); return; }
    // The bubble needs the ring's wider canvas whether or not the ring is
    // still visually open (recording can end after the ring auto-closes).
    keepOpenForBubble = true;
    if(!menuOpen){
      menuOpen = true;
      expandWindow().catch(function(){});
    }
    if(d.mode === 'listening'){
      bubble.innerHTML = '<p>Kaeya is listening to that&hellip;</p>';
    } else if(d.mode === 'guidemode'){
      // Same choice the "Guide me step by step" button offers inside the app,
      // brought out to the ball so the window never has to open.
      bubble.innerHTML =
        '<p>How should Kaeya help?</p>' +
        '<div class="brow bcol">' +
          '<button type="button" class="yes" data-guidemode="screen">&#128073; Point on screen</button>' +
          '<button type="button" class="retry" data-guidemode="text">&#128196; Show a step list</button>' +
        '</div>';
    } else if(d.mode === 'retry'){
      bubble.innerHTML = '<p>Didn&rsquo;t catch that &mdash; try again.</p>';
    } else if(d.mode === 'heard'){
      var t = (d.text || '').trim();
      var quoted = t ? '&ldquo;' + escHtml(t) + '&rdquo;' : '(heard nothing usable)';
      bubble.innerHTML =
        '<p>Kaeya heard: ' + quoted + '</p>' +
        '<div class="brow">' +
          '<button type="button" class="yes" data-voice-yes="1">&#10003; Yes, do this</button>' +
          '<button type="button" class="retry" data-voice-retry="1">&#8635; Try again</button>' +
        '</div>';
    }
    bubble.classList.add('show');
  });
  // "Yes, do this" doesn't act on its own — it hands straight to the ring so
  // the user picks WHAT Kaeya should do with what they said (Guide me through
  // it / Answer it / Explain it...). The window is already expanded for the
  // bubble, so the ring just takes it over without a resize flicker.
  function ringFromBubble(){
    bubble.classList.remove('show');
    bubble.innerHTML = '';
    voiceRingPending = true;
    if(savedGeom){                  // already expanded for the bubble
      keepOpenForBubble = false;
      menuOpen = true;
      stage.classList.add('open');
    } else {                        // shouldn't happen, but never show a clipped ring
      keepOpenForBubble = false;
      menuOpen = false;
      openMenu();
    }
  }

  bubble.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    if(b.getAttribute('data-voice-yes')){ emit('konx-voice-yes-tap'); ringFromBubble(); return; }
    if(b.getAttribute('data-voice-retry')){ emit('konx-voice-retry-tap'); hideBubble(); return; }
    var gm = b.getAttribute('data-guidemode');
    if(gm){ emit('konx-guide-mode-pick', gm); hideBubble(); return; }
  });

  // ---------- tap = open, double-tap = quick default, drag = move ----------
  var tapTimer = null;
  var drag = null;            // active drag state, or null
  var suppressClick = false;  // true right after a drag, so it isn't also a "tap"
  var DRAG_THRESH = 4;        // px of movement before it counts as a drag

  bot.addEventListener('pointerdown', function(e){
    if(e.button !== 0) return;
    if(openTimer){ clearTimeout(openTimer); openTimer = null; }  // pressing cancels a pending open
    if(menuOpen){ closeMenu(); suppressClick = true; return; }   // pressing while open just dismisses
    suppressClick = false;
    drag = { sx:e.screenX, sy:e.screenY, wx:0, wy:0, ready:false, moved:false };
    try { bot.setPointerCapture(e.pointerId); } catch(_){}
    appWindow.outerPosition().then(function(p){
      if(drag){ drag.wx = p.x; drag.wy = p.y; drag.ready = true; }
    }).catch(function(){ drag = null; });
  });

  bot.addEventListener('pointermove', function(e){
    if(!drag || !drag.ready) return;
    var dx = e.screenX - drag.sx, dy = e.screenY - drag.sy;
    if(!drag.moved && (Math.abs(dx) + Math.abs(dy)) < DRAG_THRESH) return;
    drag.moved = true;
    var dpr = window.devicePixelRatio || 1;
    appWindow.setPosition(new PhysicalPosition(
      Math.round(drag.wx + dx * dpr),
      Math.round(drag.wy + dy * dpr)
    ));
  });

  function endDrag(e){
    if(!drag) return;
    var moved = drag.moved;
    try { bot.releasePointerCapture(e.pointerId); } catch(_){}
    drag = null;
    if(moved){
      suppressClick = true;
      invoke('snap_orb').then(function(corner){
        try { localStorage.setItem('kaeya-orb-corner', corner); } catch(_){}
      }).catch(function(){});
    }
  }
  bot.addEventListener('pointerup', endDrag);
  bot.addEventListener('pointercancel', endDrag);

  bot.addEventListener('click', function(){
    if(suppressClick){ suppressClick = false; return; }   // this "click" ended a drag / dismissed the menu
    if(tapTimer){                    // this is the 2nd click -> double tap
      clearTimeout(tapTimer); tapTimer = null;
      emit('konx-quick');            // main captures + rewrites + replaces, no window
      return;
    }
    tapTimer = setTimeout(function(){ // no 2nd click came -> single tap
      tapTimer = null;
      invoke('open_konx')
        .then(function(text){ return emit('konx-captured', text || ''); })
        .catch(function(){});
    }, 240);
  });
</script>
</body>
</html>
